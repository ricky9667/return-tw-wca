          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(150)" />
          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(180)" />
          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(210)" />
          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(240)" />
          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(270)" />
          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(300)" />
          <polygon points="0,-32 5,-10 -5,-10" transform="rotate(330)" />
        </g>
        <circle cx="0" cy="0" r="17" fill="#000095" />
