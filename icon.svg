<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <g transform="translate(16, 16) scale(0.192)">
    <defs>
      <mask id="ring-mask">
        <rect width="500" height="500" fill="black" />
        <circle cx="250" cy="250" r="240" fill="white" />
        <circle cx="250" cy="250" r="180" fill="black" />
        
        <g stroke="black" stroke-width="8">
          <line x1="250" y1="250" x2="250" y2="0" />
          <line x1="250" y1="250" x2="250" y2="0" transform="rotate(60 250 250)" />
          <line x1="250" y1="250" x2="250" y2="0" transform="rotate(120 250 250)" />
          <line x1="250" y1="250" x2="250" y2="0" transform="rotate(180 250 250)" />
          <line x1="250" y1="250" x2="250" y2="0" transform="rotate(240 250 250)" />
          <line x1="250" y1="250" x2="250" y2="0" transform="rotate(300 250 250)" />
        </g>
      </mask>
    </defs>

    <g id="taiwan-flag">
      <rect x="100.25" y="150.2" width="299.5" height="199.6" fill="#FE0000" />
      <rect x="100.0" y="150.0" width="150.0" height="100.0" fill="#000095" />
      
      <g transform="translate(175.125, 200.1) scale(1.2)">
